<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songfinch Milestone Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
  .topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .topbar h1{font-size:16px;font-weight:600;letter-spacing:-.01em;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .container{max-width:1100px;margin:0 auto;padding:2rem;}
  .tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e3;margin-bottom:1.5rem;}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;font-size:13px;color:#888;cursor:pointer;margin-bottom:-1px;transition:all .15s;font-family:inherit;}
  .tab-btn:hover{color:#1a1a1a;}
  .tab-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem;}
  .metric-card{background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:1rem 1.25rem;}
  .metric-card .label{font-size:12px;color:#888;margin-bottom:4px;}
  .metric-card .value{font-size:26px;font-weight:600;font-family:'SF Mono',monospace;letter-spacing:-.02em;}
  .alert-bar{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .alert-bar .msg{font-size:13px;color:#92400e;font-weight:500;}
  .artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .artist-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1rem 1.25rem;transition:box-shadow .15s;}
  .artist-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
  .artist-card.close{border-color:#fcd34d;}
  .artist-card.hit{border-color:#86efac;}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .artist-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .artist-id{font-size:11px;color:#aaa;margin-top:1px;}
  .song-count{font-size:22px;font-weight:600;font-family:'SF Mono',monospace;text-align:right;}
  .song-label{font-size:11px;color:#888;text-align:right;}
  .badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;margin-bottom:8px;}
  .badge-warn{background:#fef3c7;color:#92400e;}
  .badge-success{background:#dcfce7;color:#166534;}
  .badge-info{background:#dbeafe;color:#1e40af;}
  .progress-wrap{margin:6px 0;}
  .progress-labels{display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-bottom:3px;}
  .progress-track{height:5px;background:#f0f0ee;border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width .5s;}
  .card-actions{display:flex;gap:6px;margin-top:10px;}
  btn,.btn{background:#fff;border:1px solid #d5d5d3;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:#1a1a1a;transition:background .1s;}
  button:hover,.btn:hover{background:#f5f5f3;}
  button:active,.btn:active{transform:scale(.98);}
  .btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
  .btn-primary:hover{background:#333;}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .section-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .section-title{font-size:13px;font-weight:500;color:#888;margin-bottom:12px;}
  input,select{width:100%;border:1px solid #e5e5e3;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border .15s;}
  input:focus,select:focus{border-color:#1a1a1a;}
  label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
  ol{padding-left:1.2rem;}
  ol li{font-size:13px;line-height:1.7;margin-bottom:8px;}
  .nard-fact-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .nard-note-card{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .nard-note-card p{color:#166534;}
  .spinner{display:inline-block;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transition:opacity .3s;pointer-events:none;max-width:320px;}
  .empty-state{text-align:center;padding:4rem 2rem;color:#888;font-size:14px;}
  .sync-info{font-size:11px;color:#aaa;}
  @media(max-width:600px){.container{padding:1rem;}.topbar{padding:0 1rem;}.grid-4{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:18px;">🎵</span>
    <h1>Songfinch Milestone Tracker</h1>
  </div>
  <div class="topbar-right">
    <span class="sync-info" id="sync-info"></span>
    <button onclick="loadSheet()">↻ Refresh</button>
    <button class="btn-primary" onclick="sendDailyDigest()">Slack digest →</button>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('nardwuar')">Nardwuar lab</button>
    <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
  </div>

  <!-- DASHBOARD -->
  <div id="panel-dashboard" class="panel">
    <div class="grid-4" id="dash-metrics"></div>
    <div id="dash-alerts" style="margin-bottom:1rem;"></div>
    <div class="artist-grid" id="dash-artists"></div>
  </div>

  <!-- NARDWUAR -->
  <div id="panel-nardwuar" class="panel" style="display:none;">
    <div class="section-card">
      <div class="section-title">Select artist to research</div>
      <select id="sel-artist" onchange="selectNard(this.value)" style="max-width:360px;"></select>
    </div>
    <div id="nard-content"></div>
  </div>

  <!-- SETTINGS -->
  <div id="panel-settings" class="panel" style="display:none;">
    <div style="max-width:520px;">
      <div class="section-card">
        <div class="section-title">Google Sheet CSV URL</div>
        <input type="text" id="cfg-csv" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?...output=csv">
        <p style="font-size:11px;color:#aaa;margin-top:6px;">File → Share → Publish to web → CSV → copy URL</p>
      </div>
      <div class="section-card">
        <div class="section-title">Slack webhook URL (free)</div>
        <input type="text" id="cfg-slack" placeholder="https://hooks.slack.com/services/...">
        <p style="font-size:11px;color:#aaa;margin-top:6px;"><a href="https://api.slack.com/messaging/webhooks" target="_blank" style="color:#2563eb;">Create a free incoming webhook →</a></p>
      </div>
      <div class="section-card">
        <div class="section-title">Alert threshold</div>
        <p style="font-size:12px;color:#888;margin-bottom:12px;">Flag artists within this many songs of a milestone</p>
        <div style="display:flex;align-items:center;gap:14px;">
          <input type="range" id="cfg-thresh" min="1" max="20" value="5" step="1" style="flex:1;width:auto;" oninput="document.getElementById('thresh-out').textContent=this.value+' songs'">
          <span id="thresh-out" style="font-size:14px;font-weight:600;min-width:54px;">5 songs</span>
        </div>
      </div>
      <button class="btn-primary" onclick="saveSettings()" style="width:100%;padding:10px;">Save settings →</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vT2qHbguGnVQK1aLrQ5Cq7ZElW0o-p9F4Gc9AX0QuBQV3reg8R94lC_gy9X2JDbZBUXHPu7Ef0WGYkC/pub?gid=0&single=true&output=csv';
const MILESTONES=[5,10,15,25,50,100,500,1000,1500,2000];
const AVATARCOLORS=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#ede9fe','#4c1d95'],['#fce7f3','#831843'],['#fef3c7','#78350f'],['#fee2e2','#7f1d1d'],['#cffafe','#164e63'],['#d1fae5','#065f46']];

let cfg={csvUrl:DEFAULT_CSV,slackWebhook:'',alertThreshold:5};
let artists=[],insights={},nardIdx=null;

function loadCfg(){try{const s=localStorage.getItem('sf_cfg');if(s)cfg={...cfg,...JSON.parse(s)};}catch{}}
function saveCfg(){try{localStorage.setItem('sf_cfg',JSON.stringify(cfg));}catch{}}

function mi(count){
  const next=MILESTONES.find(m=>m>count)??null;
  const prev=[...MILESTONES].reverse().find(m=>m<=count)??0;
  const diff=next!==null?next-count:0;
  const pct=next!==null?Math.min(100,Math.max(0,Math.round(((count-prev)/(next-prev))*100))):100;
  return{next,prev,diff,pct};
}
function col(i){return AVATARCOLORS[i%AVATARCOLORS.length];}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function parseCSV(text){
  return text.trim().split('\n').map(r=>{
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<r.length;i++){const c=r[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}
    cols.push(cur.trim());return cols;
  });
}

async function loadSheet(){
  document.getElementById('sync-info').innerHTML='<span class="spinner">↻</span> syncing...';
  try{
    const res=await fetch(cfg.csvUrl||DEFAULT_CSV);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCSV(text).slice(1).filter(r=>r[0]||r[1]);
    artists=rows.map((r,i)=>({
      idx:i,id:(r[0]||'').trim(),
      name:(r[1]||'Unknown').trim(),
      count:parseInt((r[10]||'0').replace(/,/g,''))||0
    })).filter(a=>a.name&&a.name!=='Unknown');
    document.getElementById('sync-info').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    renderDash();renderNardSelect();
  }catch(e){
    document.getElementById('sync-info').textContent='Sync failed';
    document.getElementById('dash-artists').innerHTML=`<div style="grid-column:1/-1;background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:1.5rem;"><p style="color:#b91c1c;font-weight:500;margin-bottom:6px;">Could not load sheet</p><p style="color:#b91c1c;font-size:12px;">${e.message}</p></div>`;
  }
}

function renderDash(){
  const t=cfg.alertThreshold;
  const close=artists.filter(a=>{const{diff,next}=mi(a.count);return next&&diff<=t;});
  const hits=artists.filter(a=>MILESTONES.includes(a.count));
  const total=artists.reduce((s,a)=>s+a.count,0);

  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric-card"><div class="label">Artists on roster</div><div class="value">${artists.length}</div></div>
    <div class="metric-card"><div class="label">Near milestone</div><div class="value" style="color:${close.length?'#d97706':'inherit'}">${close.length}</div></div>
    <div class="metric-card"><div class="label">Milestones hit</div><div class="value" style="color:#16a34a">${hits.length}</div></div>
    <div class="metric-card"><div class="label">Total songs</div><div class="value">${total.toLocaleString()}</div></div>
  `;

  document.getElementById('dash-alerts').innerHTML=close.map(a=>{
    const{diff,next}=mi(a.count);
    return`<div class="alert-bar">
      <span class="msg">${a.name} — ${diff} song${diff===1?'':'s'} from <strong>${next}</strong></span>
      <div style="display:flex;gap:6px;">
        <button class="btn-sm" onclick="slackOne(${a.idx})">Slack →</button>
        <button class="btn-sm" onclick="openNard(${a.idx})">Nardwuar →</button>
      </div>
    </div>`;
  }).join('');

  const sorted=[...artists].sort((a,b)=>(mi(a.count).diff||9999)-(mi(b.count).diff||9999));
  if(!sorted.length){document.getElementById('dash-artists').innerHTML='<div class="empty-state">No artists loaded yet.</div>';return;}

  document.getElementById('dash-artists').innerHTML=sorted.map(a=>{
    const info=mi(a.count);const[bg,tx]=col(a.idx);
    const isHit=MILESTONES.includes(a.count);
    const isClose=info.next&&info.diff<=t;
    const barClr=isHit?'#22c55e':isClose?'#ef4444':info.pct>=80?'#f59e0b':'#3b82f6';
    return`<div class="artist-card${isHit?' hit':isClose?' close':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="avatar" style="background:${bg};color:${tx};">${ini(a.name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="artist-name">${a.name}</div>
          <div class="artist-id">ID: ${a.id}</div>
        </div>
        <div>
          <div class="song-count">${a.count.toLocaleString()}</div>
          <div class="song-label">songs</div>
        </div>
      </div>
      ${isHit?'<span class="badge badge-success">Milestone hit!</span>':''}
      ${isClose&&!isHit?`<span class="badge badge-warn">${info.diff} away from ${info.next}</span>`:''}
      ${info.next?`
        <div class="progress-wrap">
          <div class="progress-labels"><span>${info.prev}</span><span>${info.pct}%</span><span>${info.next}</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${info.pct}%;background:${barClr};"></div></div>
        </div>`:`<p style="font-size:12px;color:#16a34a;margin-top:4px;">All milestones achieved!</p>`}
      <div class="card-actions">
        <button style="flex:1;" onclick="slackOne(${a.idx})">Slack →</button>
        <button style="flex:1;" onclick="openNard(${a.idx})">Nardwuar →</button>
      </div>
    </div>`;
  }).join('');
}

function switchTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
  document.getElementById('panel-'+t).style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(t==='nardwuar'?'nard':t)));
  if(t==='nardwuar')renderNardSelect();
  if(t==='settings')applySettingsForm();
}

function renderNardSelect(){
  const sel=document.getElementById('sel-artist');if(!sel)return;
  sel.innerHTML='<option value="">— choose an artist —</option>'+artists.map(a=>`<option value="${a.idx}">${a.name} (${a.count} songs)</option>`).join('');
  if(nardIdx!==null){sel.value=nardIdx;renderNardContent();}
}
function selectNard(v){nardIdx=v===''?null:parseInt(v);renderNardContent();}
function openNard(idx){nardIdx=idx;switchTab('nardwuar');}

function renderNardContent(){
  const el=document.getElementById('nard-content');if(!el)return;
  if(nardIdx===null){el.innerHTML='';return;}
  const a=artists.find(x=>x.idx===nardIdx);if(!a){el.innerHTML='';return;}
  const info=mi(a.count);const[bg,tx]=col(a.idx);const data=insights[a.idx];
  el.innerHTML=`
    <div class="section-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;">
        <div class="avatar" style="width:48px;height:48px;font-size:16px;background:${bg};color:${tx};">${ini(a.name)}</div>
        <div>
          <div style="font-size:18px;font-weight:600;">${a.name}</div>
          <div style="font-size:13px;color:#888;">${a.count.toLocaleString()} songs · ${info.next?info.diff+' from next milestone ('+info.next+')':'all milestones hit!'}</div>
        </div>
      </div>
      <button id="nard-btn" class="btn-primary" onclick="generateInsights()" style="width:100%;padding:10px;">${data?'Regenerate intel →':'Generate Nardwuar intel →'}</button>
      <p style="font-size:11px;color:#aaa;margin-top:6px;">AI-generated — verify fun facts before sending to the artist</p>
    </div>
    ${data?renderInsights(data,a):''}`;
}

function renderInsights(data,a){
  if(data.error)return`<p style="color:#b91c1c;font-size:13px;padding:.5rem;">${data.error}</p>`;
  return`
    <div class="nard-fact-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div class="section-title" style="margin:0;">Obscure fun facts</div>
        ${data.confidence?`<span class="badge badge-info">${data.confidence} confidence</span>`:''}
      </div>
      <ol>${(data.facts||[]).map(f=>`<li>${f}</li>`).join('')}</ol>
    </div>
    <div class="nard-fact-card">
      <div class="section-title">Personalized gift ideas</div>
      <ol>${(data.gifts||[]).map(g=>`<li>${g}</li>`).join('')}</ol>
    </div>
    ${data.note?`<div class="nard-note-card">
      <div class="section-title" style="color:#166534;">Personalized celebration note</div>
      <p style="font-size:13px;line-height:1.7;margin-bottom:12px;">${data.note}</p>
      <button onclick="composeEmail(${a.idx})">Open in email client →</button>
    </div>`:''}`;
}

async function generateInsights(){
  const btn=document.getElementById('nard-btn');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}
  const a=artists.find(x=>x.idx===nardIdx);if(!a)return;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:`You are like Nardwuar the Human Serviette — legendary music researcher with incredibly specific, obscure, verifiable knowledge.\n\nArtist: "${a.name}"\nSongs completed: ${a.count}\n\nGenerate a research package. Respond ONLY in valid JSON, no markdown:\n{"facts":["obscure TRUE verifiable fact about their background","surprising lesser-known achievement or story","specific quirky detail only a super-fan would know"],"gifts":["Gift 1 with reason it suits them","Gift 2 with reason","Gift 3 with reason","Gift 4 with reason","Gift 5 with reason"],"note":"Warm 2-sentence celebration note from the label team","confidence":"high / medium / low"}`}]
      })
    });
    const d=await res.json();
    const txt=d.content?.find(b=>b.type==='text')?.text||'{}';
    insights[nardIdx]=JSON.parse(txt.replace(/```json|```/g,'').trim());
  }catch(e){insights[nardIdx]={error:'Generation failed — '+e.message};}
  renderNardContent();
}

function composeEmail(idx){
  const a=artists.find(x=>x.idx===idx);const data=insights[idx];if(!a||!data)return;
  const s=encodeURIComponent(`Congrats on ${a.count} songs completed!`);
  const b=encodeURIComponent(`${data.note||''}\n\nFun fact: ${(data.facts||[])[0]||''}\n\nWith love,\nThe Songfinch Team`);
  window.open(`mailto:?subject=${s}&body=${b}`);
}

async function slackOne(idx){
  if(!cfg.slackWebhook){showToast('Add Slack webhook in Settings first','warn');return;}
  const a=artists.find(x=>x.idx==idx);if(!a)return;
  const info=mi(a.count);const isHit=MILESTONES.includes(a.count);const isClose=info.next&&info.diff<=cfg.alertThreshold;
  const text=isHit
    ?`🎉 *MILESTONE HIT!* *${a.name}* just completed their *${a.count}th song!* Time to celebrate.`
    :isClose?`🚨 *MILESTONE ALERT* — *${a.name}* is only *${info.diff} song${info.diff===1?'':'s'} away* from their *${info.next} songs milestone!* Start prepping.`
    :`📊 *${a.name}* — ${a.count.toLocaleString()} songs (${info.pct}% to ${info.next})`;
  try{await fetch(cfg.slackWebhook,{method:'POST',mode:'no-cors',body:JSON.stringify({text})});showToast('Slack alert sent!');}
  catch{showToast('Slack failed — check webhook URL','error');}
}

async function sendDailyDigest(){
  if(!cfg.slackWebhook){showToast('Add Slack webhook in Settings first','warn');return;}
  if(!artists.length){showToast('No artists loaded — hit Refresh first','warn');return;}
  const t=cfg.alertThreshold;
  const close=artists.filter(a=>{const{diff,next}=mi(a.count);return next&&diff<=t;});
  const hits=artists.filter(a=>MILESTONES.includes(a.count));
  const lines=[`📋 *Daily Milestone Digest* — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}`,''];
  if(hits.length){lines.push('🎉 *Milestones hit:*');hits.forEach(a=>lines.push(`  • *${a.name}* — ${a.count} songs!`));lines.push('');}
  if(close.length){lines.push('🔥 *Close to a milestone:*');close.forEach(a=>{const{diff,next}=mi(a.count);lines.push(`  • *${a.name}* — ${diff} song${diff===1?'':'s'} from ${next}`);});lines.push('');}
  if(!hits.length&&!close.length){lines.push('✅ No artists near a milestone right now.\n');}
  lines.push(`*Full roster (${artists.length} artists):*`);
  artists.forEach(a=>{const info=mi(a.count);lines.push(`  • ${a.name} — ${a.count.toLocaleString()} songs · ${info.next?info.diff+' from '+info.next:'all milestones hit!'}`);});
  try{await fetch(cfg.slackWebhook,{method:'POST',mode:'no-cors',body:JSON.stringify({text:lines.join('\n')})});showToast('Daily digest sent to Slack!');}
  catch{showToast('Digest failed','error');}
}

function applySettingsForm(){
  const f=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};
  f('cfg-csv',cfg.csvUrl);f('cfg-slack',cfg.slackWebhook);
  const t=document.getElementById('cfg-thresh');const o=document.getElementById('thresh-out');
  if(t){t.value=cfg.alertThreshold;if(o)o.textContent=cfg.alertThreshold+' songs';}
}
function saveSettings(){
  cfg={
    csvUrl:(document.getElementById('cfg-csv').value||DEFAULT_CSV).trim(),
    slackWebhook:(document.getElementById('cfg-slack').value||'').trim(),
    alertThreshold:parseInt(document.getElementById('cfg-thresh').value)||5,
  };
  saveCfg();showToast('Settings saved!');loadSheet();
}

function showToast(msg,type='success'){
  let el=document.getElementById('_toast');
  if(!el){el=document.createElement('div');el.id='_toast';el.className='toast';document.body.appendChild(el);}
  const m={success:['#f0fdf4','#166534','#86efac'],warn:['#fffbeb','#92400e','#fcd34d'],error:['#fef2f2','#b91c1c','#fca5a5']};
  const[bg,tx,br]=m[type]||m.success;
  el.style.cssText=`position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transition:opacity .3s;max-width:320px;pointer-events:none;background:${bg};color:${tx};border:1px solid ${br};opacity:1;`;
  el.textContent=msg;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',3500);
}

loadCfg();applySettingsForm();loadSheet();setInterval(loadSheet,5*60*1000);
</script>
</body>
</html>
